<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#007bff">
    <title>My Project Hub</title>
    
    <link rel="manifest" href="manifest.json">
    
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 { color: #333; }
        .container {
            width: 100%;
            max-width: 600px;
        }
        .project-card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            text-decoration: none;
            transition: transform 0.2s;
        }
        .project-card:active {
            transform: scale(0.98);
        }
        .project-info h3 {
            margin: 0;
            color: #007bff;
        }
        .project-info p {
            margin: 5px 0 0;
            font-size: 14px;
            color: #666;
        }
        .arrow {
            color: #ccc;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <h1>Project Portal</h1>
    
    <div class="container" id="project-list">
        </div>

    <script>
        // --- 1. CONFIGURATION: ADD YOUR PROJECT URLS HERE ---
        const myProjects = [
            { 
                name: "AI Tool Catalog", 
                url: "https://shashanklearner23.github.io/ai-catalog", 
                description: "My AI tool management app" 
            },
            { 
                name: "Portfolio Site", 
                url: "https://shashanklearner23.github.io/portfolio", 
                description: "Showcase of my web development work" 
            },
            { 
                name: "Data Structures Tool", 
                url: "https://shashanklearner23.github.io/ds-visualizer", 
                description: "C++ and Algorithms interactive guide" 
            }
        ];

        // --- 2. RENDER PROJECTS ---
        const listContainer = document.getElementById('project-list');
        
        myProjects.forEach(project => {
            const card = document.createElement('a');
            card.href = project.url;
            card.className = 'project-card';
            card.target = "_blank"; // Opens project in new tab

            card.innerHTML = `
                <div class="project-info">
                    <h3>${project.name}</h3>
                    <p>${project.description}</p>
                </div>
                <div class="arrow">➔</div>
            `;
            listContainer.appendChild(card);
        });

        // --- 3. REGISTER SERVICE WORKER ---
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('Service Worker registered!', reg))
                    .catch(err => console.log('Registration failed:', err));
            });
        }
    </script>
</body>
</html>
