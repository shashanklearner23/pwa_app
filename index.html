<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#007bff">
    <title>My Project Hub</title>
    
    <link rel="manifest" href="manifest.json">
    
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 { color: #333; margin-top: 30px; }
        .container {
            width: 100%;
            max-width: 600px;
            margin-top: 20px;
        }
        .project-card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            text-decoration: none;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .project-card:hover {
            box-shadow: 0 6px 12px rgba(0,0,0,0.15);
        }
        .project-card:active {
            transform: scale(0.98);
        }
        .project-info h3 {
            margin: 0;
            color: #007bff;
        }
        .project-info p {
            margin: 5px 0 0;
            font-size: 14px;
            color: #666;
        }
        .arrow {
            color: #ccc;
            font-size: 20px;
        }
    </style>
</head>
<body>

    <h1>Project Portal</h1>
    
    <div class="container" id="project-list">
        </div>

    <script>
        // --- 1. CONFIGURATION: YOUR ACTUAL URLS ---
        const myProjects = [
            { 
                name: "Main Google App", 
                url: "https://script.google.com/macros/s/AKfycbx_enYkkTtDrX8axDjbImX0mWQ71RWnAR1XbC1iPWHAxXj6RydfPsSyWR8nnRIb_N3i/exec", 
                description: "My Apps Script Automation Tool" 
            }
            // You can add more { name: "", url: "", description: "" } objects here later
        ];

        // --- 2. RENDER PROJECTS ---
        const listContainer = document.getElementById('project-list');
        
        myProjects.forEach(project => {
            const card = document.createElement('a');
            card.href = project.url;
            card.className = 'project-card';
            card.target = "_blank"; 

            card.innerHTML = `
                <div class="project-info">
                    <h3>${project.name}</h3>
                    <p>${project.description}</p>
                </div>
                <div class="arrow">➔</div>
            `;
            listContainer.appendChild(card);
        });

        // --- 3. REGISTER SERVICE WORKER ---
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('PWA Service Worker registered!'))
                    .catch(err => console.log('PWA Registration failed:', err));
            });
        }
    </script>
</body>
</html>
