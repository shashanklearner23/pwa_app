<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#f59e0b">
    <title>Counselling App</title>
    <link rel="manifest" href="manifest.json">
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #0f172a;
            color: white;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }
        h1 { margin-top: 50px; color: #f8fafc; }
        
        #install-btn {
            display: none; 
            background: linear-gradient(135deg, #f59e0b, #d97706);
            color: #000;
            border: none;
            padding: 15px 30px;
            border-radius: 30px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin: 20px 0;
            box-shadow: 0 10px 15px -3px rgba(245, 158, 11, 0.4);
        }

        .container { width: 100%; max-width: 500px; margin-top: 20px; }
        .project-card {
            background: #1e293b;
            border-radius: 16px;
            padding: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            text-decoration: none;
            border: 1px solid #334155;
            transition: all 0.3s ease;
        }
        .project-card:hover { transform: translateY(-5px); border-color: #f59e0b; }
        .project-info h3 { margin: 0; color: #f59e0b; font-size: 20px; }
        .project-info p { margin: 8px 0 0; font-size: 14px; color: #94a3b8; }
        .arrow { color: #f59e0b; font-size: 24px; }
    </style>
</head>
<body>

    <h1>AI Tools App</h1>

    <button id="install-btn">📥 Download App</button>
    
    <div class="container" id="project-list"></div>

    <script>
        const myProjects = [{ 
            name: "Counselling App", 
            url: "https://script.google.com/macros/s/AKfycbzUcZEASvFx1TLg1xkkfvwz6Mr-m5hza5XQ59kEhmqgc4elUKGl6Qe8xsYtbH1UhUwl/exec", 
            description: "Launch your counselling session" 
        }];

        const listContainer = document.getElementById('project-list');
        myProjects.forEach(project => {
            const card = document.createElement('a');
            card.href = project.url;
            card.className = 'project-card';
            card.target = "_self"; 
            card.innerHTML = `
                <div class="project-info">
                    <h3>${project.name}</h3>
                    <p>${project.description}</p>
                </div>
                <div class="arrow">➔</div>
            `;
            listContainer.appendChild(card);
        });

        let deferredPrompt;
        const installBtn = document.getElementById('install-btn');

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            installBtn.style.display = 'block';

            installBtn.addEventListener('click', () => {
                installBtn.style.display = 'none';
                deferredPrompt.prompt();
                deferredPrompt.userChoice.then(() => {
                    deferredPrompt = null;
                });
            });
        });

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('SW Registered'))
                    .catch(err => console.log('SW Error', err));
            });
        }
    </script>
</body>
</html>
